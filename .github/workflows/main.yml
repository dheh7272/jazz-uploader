name: Kareem Bot 24h
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Bot
        env:
          JAZZ_NUMBER: ${{ secrets.JAZZ_NUMBER }}
        run: python bot.py
